nome: SAGA
categoria: sistema que faz o WhatsApp da empresa funcionar sozinho

descricao_curta: >
  Sistema que organiza o WhatsApp da empresa pra atender, mostrar produto,
  montar pedido, cobrar, recuperar quem desistiu e mostrar tudo num painel.

descricao_longa: >
  O SAGA pega o WhatsApp da empresa e faz ele funcionar de um jeito onde
  o cliente entra, já vê o que tem disponível com foto e preço, escolhe o
  que quer, preenche o que precisa, faz o pedido, paga e recebe confirmação
  — tudo sem precisar de alguém do outro lado fazendo na mão. Se a pessoa
  para no meio, o sistema manda um áudio fazendo follow-up. Se ela
  avança, o sistema marca e classifica. Se ela fecha, registra tudo. E a
  empresa vê num painel o que vendeu, o que travou, quem parou onde, quanto
  dinheiro perdeu e onde vale a pena entrar na conversa.

funcoes:
  - nome: menu de entrada com botões
    beneficio: o cliente já sabe o que pode fazer sem precisar perguntar

  - nome: catálogo visual em carrossel com foto, preço e botão
    beneficio: o cliente vê o que tem, quanto custa e escolhe na hora — sem ninguém precisar mandar foto e preço um por um

  - nome: listas interativas com opções organizadas
    beneficio: organiza muitas opções de um jeito fácil de escolher sem poluir a conversa

  - nome: montagem automática do pedido
    beneficio: o pedido se monta sozinho conforme o cliente escolhe — sem ninguém anotando na mão

  - nome: resumo e confirmação do pedido antes de fechar
    beneficio: evita erro e retrabalho porque o cliente vê tudo que escolheu antes de confirmar

  - nome: geração de PIX e confirmação automática quando o pagamento cai
    beneficio: o pagamento acontece e confirma sem ninguém ficar perguntando "já pagou?"

  - nome: envio de foto, vídeo, áudio, documento, localização e contato
    beneficio: manda qualquer tipo de conteúdo que o atendimento precisar, tudo pelo sistema

  - nome: recuperação de quem desistiu por áudio de voz automático
    beneficio: quem parou no meio recebe um áudio puxando de volta — sem ninguém precisar lembrar ou ligar

  - nome: acompanhamento de em qual etapa cada pessoa parou
    beneficio: a empresa sabe exatamente onde as pessoas estão desistindo e pode agir em cima disso

  - nome: qualificação do lead com pontuação e classificação automática
    beneficio: separa quem está pronto pra comprar de quem ainda está só olhando — sem ninguém analisando conversa por conversa

  - nome: recomendação do produto ou serviço certo pro perfil do cliente
    beneficio: aumenta a chance de venda porque sugere o que faz sentido pra aquela pessoa, não qualquer coisa

  - nome: agendamento e reserva direto pelo WhatsApp
    beneficio: o cliente marca horário ou reserva sem precisar ligar, mandar email ou esperar resposta

  - nome: direcionamento pra atendente humano quando o automático não resolve
    beneficio: o cliente não fica preso no automático quando precisa de uma pessoa de verdade

  - nome: disparo de mensagem pra vários clientes de uma vez com filtro
    beneficio: manda mensagem só pra quem faz sentido — quem sumiu, quem nunca comprou, quem já voltou — sem mandar pra todo mundo igual

  - nome: nutrição automática de conteúdo ao longo do tempo
    beneficio: mantém o contato com o lead sem ninguém precisar lembrar de mandar mensagem

  - nome: painel com números em tempo real
    beneficio: a empresa vê na hora quantos pedidos tem, quanto faturou, quantos abandonaram e quantos clientes novos chegaram

  - nome: funil de conversão
    beneficio: mostra em qual etapa as pessoas estão parando — fica claro onde a empresa está perdendo gente

  - nome: quadro kanban com leads
    beneficio: cada pessoa vira um card que a empresa arrasta conforme avança — dá pra ver todo mundo de uma vez e saber quem precisa de atenção

  - nome: jornada do cliente
    beneficio: mostra tudo que a pessoa fez do começo ao fim — o que clicou, o que mandou, onde parou — sem precisar perguntar nada

  - nome: abandonos por etapa com lista de telefones
    beneficio: além de saber onde as pessoas param, já mostra os telefones pra empresa poder ir atrás e tentar recuperar

  - nome: disparos em massa com filtro inteligente
    beneficio: a empresa consegue falar com o grupo certo na hora certa — quem sumiu há 30 dias, quem comprou 2 vezes, quem nunca fechou

  - nome: ranking de produtos ou serviços
    beneficio: mostra o que vende mais e o que não sai — ajuda a decidir no que apostar e o que mudar

  - nome: análise de pagamentos
    beneficio: mostra quanto entrou por cada forma de pagamento e se tem alguma que trava mais que outra

  - nome: evolução de faturamento
    beneficio: mostra se o dinheiro está subindo, caindo ou parado — por dia, semana e mês

  - nome: horários de pico
    beneficio: mostra em que hora e dia da semana a empresa mais vende — ajuda a saber quando botar mais gente ou mais esforço

  - nome: curva ABC
    beneficio: separa o que dá dinheiro de verdade do que só ocupa espaço — os 20% que fazem 80% do faturamento ficam claros

  - nome: análise de venda adicional
    beneficio: mostra quando o cliente compra algo a mais junto e qual combinação mais acontece — ajuda a montar ofertas melhores

  - nome: clientes novos vs quem já voltou
    beneficio: mostra se a empresa está vivendo só de gente nova ou se o pessoal está voltando — e quanto cada cliente vale ao longo do tempo

  - nome: dinheiro perdido por abandono
    beneficio: calcula em reais quanto a empresa deixou de ganhar por causa de gente que desistiu em cada etapa — torna o prejuízo visível

  - nome: comparativo de período
    beneficio: compara essa semana com a passada, esse mês com o anterior — mostra se está melhorando ou piorando

  - nome: análise por região
    beneficio: mostra de onde vêm mais pedidos e onde o ticket é maior — ajuda a saber onde concentrar esforço

  - nome: retenção de clientes
    beneficio: mostra quantos clientes continuaram comprando ao longo do tempo — dá pra ver se o pessoal volta ou some depois da primeira compra

  - nome: evolução diária de conversões
    beneficio: mostra dia a dia quantos entraram, quantos avançaram e quantos compraram — dá pra ver tendência

  - nome: sazonalidade
    beneficio: mostra se existe um padrão que se repete — quais dias vendem mais, quais vendem menos

  - nome: clientes em risco
    beneficio: lista quem não compra há muito tempo antes de perder de vez — dá tempo de agir

  - nome: análise de margem
    beneficio: mostra quanto sobra de verdade depois de tirar o custo — e quanto precisa vender por dia pra fechar a conta

  - nome: pareto de clientes
    beneficio: mostra que poucos clientes fazem a maior parte do faturamento — ajuda a saber quem tratar como ouro

  - nome: integração com outros sistemas da empresa
    beneficio: se a empresa já usa outro sistema (ERP, loja virtual, planilha, agenda etc.), o SAGA pode se conectar e trocar informações — sem precisar ficar copiando dado de um lugar pro outro

  - nome: pixel de conversão
    beneficio: marca cada venda que acontece pelo WhatsApp e avisa as plataformas de anúncio (Meta, Google etc.) que aquela venda veio de lá — a empresa sabe qual anúncio está trazendo resultado de verdade e onde vale colocar mais dinheiro

  - nome: conversões personalizadas no pixel
    beneficio: a empresa escolhe o que quer rastrear como conversão — pode ser por produto vendido, por categoria, por valor, por etapa alcançada, por tipo de cliente ou qualquer combinação que fizer sentido pro negócio dela. Isso permite que os anúncios sejam otimizados não só pra "vendeu ou não vendeu", mas pra exatamente o tipo de venda que a empresa mais quer

  - nome: rastreamento de eventos no pixel
    beneficio: além da venda final, marca cada passo que o cliente deu — viu o catálogo, escolheu produto, iniciou pedido, chegou no pagamento — e manda tudo pro Meta e Google. Assim os anúncios ficam mais inteligentes porque a plataforma aprende o perfil de quem avança, não só de quem compra

valor:
  implantacao_minima: 1500
  mensalidade_minima: 500
  observacao: varia conforme o escopo e a profundidade da implantação