# Mapeamento de neurais por etapa
#
# base: neurais que rodam sempre nesta etapa
# contextual_candidates: neurais que podem ser ativados por sinal
# forbidden: neurais que nunca devem rodar nesta etapa
#
# Etapas não listadas usam apenas o neural base psicometria.

etapa_01_abertura:
  base:
    - psicometria
  contextual_candidates: []
  forbidden:
    - psicanalise
    - neurociencia
    - arqueologia_mental

