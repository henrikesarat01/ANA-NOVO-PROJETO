offer_name: SAGA
knowledge_product_slug: saga
offer_type: sistema_whatsapp
offer_summary: sistema para vendas, atendimento e acompanhamento no WhatsApp

primary_sale_motion: consultiva
conversation_entry_strategy: contextual_then_dor
first_question_goal: nicho_ou_segmento_produto_que_o_cliente_vende

early_allowed_moves:
  - explicacao_curta_do_que_e
  - pergunta_de_contexto_do_negocio

early_forbidden_moves:
  - preco_sem_saber_o_que_o_cliente_vende
  - detalhe_tecnico_longo_cedo
  - formulario_de_qualificacao

explanation_strategy:
  explain_what_it_is_early: true
  technical_pitch_early: curto
  implementation_details_only_after_fit: true
  prefer_practical_examples: true

trust_strategy: explicar de forma simples e ancorar rapido no caso real
proof_strategy: exemplo_pratico_curto

price_strategy:
  floor_allowed_early: false
  full_range_allowed_only_after_context: true
  implantation_details_only_after_fit: true
  precise_quote_only_after_scope: true
  proof_before_price: false

pricing_validation:
  require_minimum_validation_before_price: true
  allow_price_before_minimum_validation: false
  prefer_smallest_missing_variable: true
  max_questions_before_price_per_turn: 1
  explain_why_question_matters: true
  explanation_style_before_question: breve_contextual
  avoid_dry_questioning: true
  avoid_question_stack: true

  minimum_required_variables:
    - nicho_ou_segmento_produto_que_o_cliente_vende

  fixed_required_variables:
    - nicho_ou_segmento_produto_que_o_cliente_vende

  adaptive_dynamic_variables: []
  minimum_dynamic_signals_before_price: 0
  dynamic_checkpoints_are_mandatory: false
  confidence_modulates_question_style_not_requirement: false

  optional_but_relevant_variables: []

  variables_that_change_price:
    - nicho_ou_segmento_produto_que_o_cliente_vende

  preferred_question_sequence:
    - nicho_ou_segmento_produto_que_o_cliente_vende

  adaptive_inference:
    enabled: false
    infer_from_niche_before_asking: false
    choose_next_question_from_case_not_fixed_sequence: false
    allow_flow_validation_after_dynamic_minimum: false
    log_detailed_reasoning: true
    filosofia_de_inferencia_do_fluxo: ""
    filosofia_de_selecao_da_proxima_pergunta: ""
    filosofia_de_validacao_antes_do_preco: ""
    filosofia_de_pergunta_obrigatoria_com_forma_flexivel: ""

  variable_definitions:
    nicho_ou_segmento_produto_que_o_cliente_vende:
      known_fields:
        - niche_known
      focus: nicho_ou_segmento_produto_que_o_cliente_vende
      label: o que voce vende hoje
      shape: open_context
      constraints:
        - single_question
        - avoid_menu
        - avoid_taxonomy
      reason: ancorar a conversa no produto, servico, nicho ou segmento real antes de qualquer valor
      changes: base minima para entender aderencia e precificacao

  price_release_modes:
    floor_only_after_minimum_validation: true
    range_only_after_context: true
    precise_only_after_scope: true

pricing_contract:
  floor_implantation: 1500
  floor_monthly: 500
  timeline_weeks: "3-4"
  monthly_billing_starts: após entrada em operação
  implementation_phases:
    - entendimento do caso
    - desenho inicial
    - implantação inicial
  payment_terms:
    upfront_percent: 50
    delivery_percent: 50
  complexity_multipliers:
    simples: 1.0
  readiness_stage_multipliers:
    A: 1.0

capability_mapping:
  require_contextual_function_mapping_before_value: false
  require_characteristic_translation: false
  require_operational_gain_translation: false
  prefer_dual_function_frame: false
  max_functions_in_negotiation_frame: 1

flow_validation:
  require_minimal_flow_before_price: false
  approval_variable: exemplo_minimo_de_fluxo_aprovado
  require_capability_snapshot_before_flow_validation: false
  flow_model_style: operational_minimum

questioning_strategy:
  every_question_must_have_visible_reason: true
  reason_must_be_customer_facing: true
  prefer_context_then_question: true
  prefer_single_question: true
  avoid_interrogatory_flow: true
  avoid_generic_qualification: true
  prefer_smallest_useful_question: true
  infer_capability_paths_from_context: false
  choose_questions_that_disambiguate_relevant_capabilities: false
  avoid_questions_unlinked_to_real_capabilities: false

conversation_progression:
  - situar rapidamente o que e
  - entender o que o cliente vende
  - so depois abrir contexto adicional e valor

success_signals:
  - cliente diz o que vende
  - conversa sai do abstrato
  - existe base minima para continuar

objection_signals:
  - pedido de preco antes de contexto minimo
  - cliente ainda abstrato sobre o proprio negocio

moment_guidance:
  opening:
    objective: situar rapidamente a oferta e descobrir o que o cliente vende
    preferred_move: explicacao_curta_e_contextualizacao
    question_style: pergunta_de_contexto_do_negocio
    avoid:
      - preco_sem_contexto
      - pitch_tecnico_longo

question_contracts:
  nicho_ou_segmento_produto_que_o_cliente_vende:
    focus: nicho_ou_segmento_produto_que_o_cliente_vende
    label: o que voce vende hoje
    shape: open_context
    constraints:
      - single_question
      - avoid_menu
      - avoid_taxonomy
    reason: sair do abstrato e entender o produto, servico, nicho ou segmento real do cliente

runtime_hints:
  knowledge_product_slug: saga
  planner_style_bias: consultivo_objetivo
  response_opening_bias: anchor_then_invite
  confidence: 0.0
