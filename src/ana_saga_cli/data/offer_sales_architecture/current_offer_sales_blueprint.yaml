offer_name: SAGA
knowledge_product_slug: saga
offer_type: software_whatsapp_automation
offer_summary: software que organiza atendimento, triagem, jornada comercial e operação no WhatsApp
primary_sale_motion: consultiva
conversation_entry_strategy: contextual_then_dor
first_question_goal: entender_tipo_de_operacao_e_uso_atual
early_allowed_moves:
  - explicacao_curta_do_que_e
  - pergunta_de_contexto_do_negocio
  - pergunta_de_uso_atual
  - pergunta_de_dor_operacional
early_forbidden_moves:
  - clareza_abstrata_sem_contexto
  - pitch_tecnico_longo
  - detalhe_de_implantacao_cedo
  - preco_completo_cedo
explanation_strategy:
  explain_what_it_is_early: true
  technical_pitch_early: curto
  implementation_details_only_after_fit: true
  prefer_practical_examples: true
trust_strategy: mostrar aplicacao no caso real antes de tecnicismo ou promessa ampla
proof_strategy: exemplo_pratico_curto
price_strategy:
  floor_allowed_early: true
  full_range_allowed_only_after_context: true
  implantation_details_only_after_fit: true
  precise_quote_only_after_scope: true
  proof_before_price: true
pricing_validation:
  require_minimum_validation_before_price: true
  allow_price_before_minimum_validation: false
  prefer_smallest_missing_variable: true
  max_questions_before_price_per_turn: 1
  explain_why_question_matters: true
  explanation_style_before_question: breve_contextual
  avoid_dry_questioning: true
  avoid_question_stack: true
  minimum_required_variables:
    - nicho_ou_segmento_produto_que_o_cliente_vende
    - exemplo_minimo_de_fluxo_aprovado
  fixed_required_variables:
    - nicho_ou_segmento_produto_que_o_cliente_vende
    - exemplo_minimo_de_fluxo_aprovado
  adaptive_dynamic_variables:
    - como_as_vendas_acontecem_hoje
    - como_o_cliente_compra_hoje
  minimum_dynamic_signals_before_price: 2
  dynamic_checkpoints_are_mandatory: true
  confidence_modulates_question_style_not_requirement: true
  optional_but_relevant_variables:
    - como_as_vendas_acontecem_hoje
    - como_o_cliente_compra_hoje
    - quantidade_de_fluxos
    - necessidade_de_integracao
    - fechamento_no_whatsapp_ou_triagem
  variables_that_change_price:
    - nicho_ou_segmento_produto_que_o_cliente_vende
    - como_as_vendas_acontecem_hoje
    - como_o_cliente_compra_hoje
    - exemplo_minimo_de_fluxo_aprovado
    - complexidade_do_fluxo
    - integracao
    - quantidade_de_jornadas
  preferred_question_sequence:
    - nicho_ou_segmento_produto_que_o_cliente_vende
    - como_as_vendas_acontecem_hoje
    - como_o_cliente_compra_hoje
    - exemplo_minimo_de_fluxo_aprovado
    - fator_estrutural_de_complexidade
  adaptive_inference:
    enabled: true
    infer_from_niche_before_asking: true
    choose_next_question_from_case_not_fixed_sequence: true
    allow_flow_validation_after_dynamic_minimum: true
    log_detailed_reasoning: true
    filosofia_de_inferencia_do_fluxo: >
      Depois de entender o que o cliente vende, não trate a conversa como coleta de
      campos. Imagine como essa venda provavelmente acontece na vida real: como a
      pessoa chega, como entende a oferta, como escolhe, onde pede ajuda e o que
      precisa acontecer para a compra sair. A partir disso, aproxime-se da menor
      dúvida que ainda muda materialmente o desenho do fluxo. Não pergunte para
      mapear tudo; pergunte só para reduzir a incerteza mais decisiva. Se o caso já
      estiver claro, avance sem voltar para perguntas de base.
    filosofia_de_selecao_da_proxima_pergunta: >
      A próxima pergunta nunca deve nascer de uma sequência fixa. Ela deve nascer do
      encontro entre o que esse negócio parece vender, a forma provável dessa jornada
      e a parte da experiência que ainda está nebulosa. A boa pergunta não é a mais
      completa; é a que mais ajuda a transformar um caso genérico em um fluxo
      plausível. Se duas dúvidas forem possíveis, escolha a que mais muda o fluxo e
      o valor. Se nenhuma mudar muito, não pergunte.
    filosofia_de_validacao_antes_do_preco: >
      Antes de preço, a ANA não precisa esgotar o diagnóstico. Ela precisa apenas
      sair do abstrato e chegar a um fluxo mínimo crível para aquele negócio. Isso
      acontece quando já está claro o que o cliente vende e quando a conversa permite
      visualizar, com alguma nitidez, como a venda acontece ou pode acontecer. A
      validação final não é burocracia: é a confirmação de que o fluxo proposto
      conversa com a rotina real do cliente.
    filosofia_de_pergunta_obrigatoria_com_forma_flexivel: >
      Os pontos obrigatórios do pré-preço continuam existindo, mas a forma da
      pergunta não deve ser fixa. A ANA não pula esses pontos só porque sente que
      já entendeu; ela usa a leitura do caso para decidir como perguntar. Quando a
      hipótese ainda está aberta, pergunta de forma exploratória. Quando já existe
      uma hipótese forte, pergunta por confirmação curta, recorte ou mini-cena.
      A consistência está nos pontos que precisam ser atravessados; a naturalidade
      está no jeito de atravessá-los.
  variable_definitions:
    nicho_ou_segmento_produto_que_o_cliente_vende:
      known_fields:
        - niche_known
      focus: nicho_ou_segmento_produto_que_o_cliente_vende
      label: o que voce vende hoje
      shape: open_context
      constraints:
        - single_question
        - avoid_menu
        - avoid_taxonomy
      reason: sair do abstrato e ancorar a conversa no tipo real de produto, nicho ou segmento
      changes: leitura do caso, jornada provavel e filtro do fluxo
    como_as_vendas_acontecem_hoje:
      known_fields:
        - operation_model_known
        - customer_type_known
      focus: como_as_vendas_acontecem_hoje
      label: como as vendas acontecem hoje
      shape: open_context
      constraints:
        - single_question
        - avoid_menu
        - avoid_taxonomy
      reason: entender como a venda sai do interesse e vira conversa, pedido ou fechamento
      changes: desenho provavel do fluxo e nivel de intervencao humana
    como_o_cliente_compra_hoje:
      known_fields:
        - channel_usage_known
      focus: como_o_cliente_compra_hoje
      label: como o cliente compra hoje
      shape: open_context
      constraints:
        - single_question
        - avoid_menu
        - avoid_taxonomy
      reason: entender como o cliente avanca hoje ate escolher, pedir ou fechar
      changes: papel do WhatsApp, autonomia do cliente e profundidade do fluxo
    exemplo_minimo_de_fluxo_aprovado:
      known_fields: []
      focus: exemplo_minimo_de_fluxo_aprovado
      label: confirmação do fluxo proposto
      shape: approval_check
      constraints:
        - single_question
        - avoid_menu
        - avoid_taxonomy
      reason: validar um fluxo exemplo completo do SAGA no caso real, como último passo antes de abrir valor
      changes: segurança para abrir faixa com base no fluxo que realmente será implantado
  price_release_modes:
    floor_only_after_minimum_validation: true
    range_only_after_context: true
    precise_only_after_scope: true
pricing_contract:
  floor_implantation: 1500
  floor_monthly: 500
  timeline_weeks: "3-4"
  monthly_billing_starts: após entrada em operação
  implementation_phases:
    - descoberta operacional
    - desenho do fluxo
    - implantação inicial
  payment_terms:
    upfront_percent: 50
    delivery_percent: 50
  complexity_multipliers:
    simples: 1.0
    media: 1.35
    alta: 1.8
  readiness_stage_multipliers:
    A: 1.0
    B: 1.2
    C: 1.5
capability_mapping:
  require_contextual_function_mapping_before_value: true
  require_characteristic_translation: true
  require_operational_gain_translation: true
  prefer_dual_function_frame: true
  max_functions_in_negotiation_frame: 2
flow_validation:
  require_minimal_flow_before_price: true
  approval_variable: exemplo_minimo_de_fluxo_aprovado
  require_capability_snapshot_before_flow_validation: true
  flow_model_style: complete_saga_flow
capability_runtime:
